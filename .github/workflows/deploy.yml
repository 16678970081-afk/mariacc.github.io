name: Deploy to GitHub Pages

on:
  push:
    branches: [main]    # 或 master，按你的默认分支
  workflow_dispatch:    # 允许手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install, build, and upload
        uses: withastro/action@v3
        # 默认参数已能覆盖大多数情况，特殊场景才需要：
        # with:
        #   path: .                  # 项目根目录
        #   node-version: 20         # Node 版本
        #   package-manager: npm     # 或 pnpm@latest, yarn

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4